<!DOCTYPE html>
<html>
<head>
    <title>Thiết kế form </title>
    <meta charset="UTF-8">
	<link rel="stylesheet" href="../css/style2.css">
</head>

<body>
    <p> </p>
    <div class="container"></div> 
    <form id = 'frmlogin'> 
        <h3>Đăng nhập hệ thống</h3>
        <div class = "form-group">
            <label for = "txtUsername">Tên đăng nhập</label>
            <input class ="form-control"type = "text" id ="txtUsername" placeholder="Nhập tên của bạn">
            <button onclick="toggle()">xóa</button>
        </div>
        <div class = "form-group">
            <label for = "txtPassword">Mật khẩu</label>
            <input class ="form-control" type = "password" id ="txtPassword" placeholder="Nhập mật khẩu">
        </div>
        <input type ="submit" name ="sbLogin" value="Đăng nhập">
        <input type ="reset" name ="rsCancel" value="Hủy bỏ">
    </form>
</body>
</html>

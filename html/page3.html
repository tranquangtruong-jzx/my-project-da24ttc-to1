<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Form Đăng Ký</title>

<link rel="stylesheet" href="../css/style3.css">

</head>

<body>

<div class="form-box">
<h2>Form Đăng Ký</h2>

<form>

<div class="form-row">
    <div class="form-group">
        <label>SĐT</label>
        <input type="tel" required>
    </div>

    <div class="form-group">
        <label>Địa chỉ</label>
        <input type="text" required>
    </div>
</div>

<div class="form-row">
    <div class="form-group">
        <label>Họ tên</label>
        <input type="text" required>
    </div>

    <div class="form-group">
        <label>MSSV</label>
        <input type="text" required>
    </div>
</div>

<div class="form-row">
    <div class="form-group">
        <label>Lớp</label>
        <select>
            <option>DA24TTA</option>
            <option>DA24TTB</option>
            <option>DA24TTC</option>
            <option>DA24TTD</option>
        </select>
    </div>

    <div class="form-group">
        <label>Giới tính</label>
        <select>
            <option>Nam</option>
            <option>Nữ</option>
        </select>
    </div>
</div>

<div class="form-row">
    <div class="form-group">
        <label>Ngày sinh</label>
        <input type="date">
    </div>

    <div class="form-group">
        <label>Email</label>
        <input type="email">
    </div>
</div>


<div class="button-group">
    <button type="submit">Đăng ký</button>
    <button type="reset">Nhập lại</button>
</div>

</form>
</div>

</body>
</html>

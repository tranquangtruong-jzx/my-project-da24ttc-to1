<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../css/style4.css">
<body>
<table border="1">
  <tr>
    <th>STT</th>
    <th>Tên sản phẩm</th> 
    <th> Số lượng</th>
    <th> Đơn giá</th>
    <th> Thành tiền </th>
    <tr>

     <tr>
        <td> 1 </td>
        <td> A </td>
        <td><input class="soluong" value="3"></td>
        <td> <input class="dongia"value="10"> </td>
         <td class="thanhtoan"></td>
    </tr>

       <tr>
    <td> 2</td>
    <td> B</td>
    <td><input class="soluong" value="2"></td>
    <td><input class="dongia"value="20"> </td>
     <td class="thanhtoan"></td>

    <tr>
        <tr>
        <td> 3</td>
        <td> C</td>
        <td> <input class="soluong" value="1"></td>
        <td> <input class="dongia"value="30"> </td>
        <td class="thanhtoan"></td>
    </tr> 

    <tr>
    <td colspan="4"><b>tổng thanh toán </b></td>
    <td id="tongthanhtoan"></b></b></td>

  </tr>
</table> 
<script>
const dongia = document.getElementsByClassName ("dongia");
const soluong = document.getElementsByClassName ("soluong");
const thanhtien = document.getElementsByClassName("thanhtoan");  
let tongthanhtoan=0;  
for (let i=0; i<dongia.length; i++)
{
    thanhtien[i].innerHTML= dongia[i].value*soluong[i].value;
   tongthanhtoan += parseInt(thanhtien[i].innerHTML);
}
document.getElementById("tongthanhtoan").innerHTML=tongthanhtoan;
</script>
</body>
</html>
